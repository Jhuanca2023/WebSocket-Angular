<div class="create-room-wrapper">
    <div class="glowing-blob blob-1"></div>
    <div class="glowing-blob blob-2"></div>

    <div class="container">
        <div class="creation-card glass-panel">
            <header class="card-header">
                <button class="btn-back" (click)="goBack()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px;">
                        <path d="M19 12H5M12 19l-7-7 7-7" />
                    </svg>
                    <span>Volver</span>
                </button>
                <div class="header-content">
                    <h1>Crear Nueva Sala</h1>
                    <p>Configura tu espacio de chat premium</p>
                </div>
            </header>

            <form (submit)="createRoom()" class="creation-form">
                <div class="form-group">
                    <label for="roomName">Nombre de la Sala</label>
                    <div class="input-wrapper">
                        <input type="text" id="roomName" name="roomName" [(ngModel)]="roomName"
                            placeholder="Ej: Design Chat, Dev Team..." required autocomplete="off">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2m12-11a4 4 0 100-8 4 4 0 000 8z" />
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Descripción (opcional)</label>
                    <textarea id="description" name="description" [(ngModel)]="description"
                        placeholder="De qué trata esta sala..." rows="3"></textarea>
                </div>

                <div class="form-group toggle-group">
                    <div class="toggle-info">
                        <label>Sala Privada</label>
                        <p>Solo usuarios con invitación podrán unirse</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" name="isPrivate" [(ngModel)]="isPrivate">
                        <span class="slider round"></span>
                    </label>
                </div>

                <footer class="form-footer">
                    <button type="submit" class="btn-submit" [disabled]="!roomName || loading">
                        <span *ngIf="!loading">Lanzar Sala</span>
                        <div *ngIf="loading" class="loader-mini"></div>
                    </button>
                </footer>
            </form>
        </div>
    </div>
</div>
