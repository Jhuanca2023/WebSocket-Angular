<div class="split-auth-layout">
    <div class="auth-split-content">

        <!-- Left Side: Visual Element -->
        <div class="auth-left-brand">
            <div class="brand-wrapper">
                <img src="images/visual_element.png" alt="Branding" class="brand-hero-img">
                <h1 class="brand-title">WEBROCKET<span>.</span></h1>
                <p class="brand-subtitle">Bienvenido de nuevo a WebRocket</p>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="auth-right-form">
            <div class="login-card glass-panel">
                <div class="form-header">
                    <h2>Welcome back</h2>
                    <p>Sign in to your account to continue</p>
                </div>

                <form (submit)="onSubmit()" class="main-login-form">
                    <div class="form-group">
                        <label>Email address</label>
                        <input type="email" [(ngModel)]="credentials.email" name="email" placeholder="you@example.com">
                    </div>

                    <div class="form-group">
                        <div class="label-row">
                            <label>Password</label>
                            <a href="#" class="forgot-link">Forgot password?</a>
                        </div>
                        <div class="password-input-wrapper">
                            <input type="password" [(ngModel)]="credentials.password" name="password"
                                placeholder="Enter your password">
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                    </div>

                    <div *ngIf="error" class="error-alert">{{ error }}</div>

                    <button type="submit" class="btn-primary-solid" [disabled]="loading">
                        {{ loading ? 'Signing In...' : 'Sign In' }}
                    </button>

                    <div class="divider">
                        <span>Or continue with</span>
                    </div>

                    <div class="social-login">
                        <button type="button" class="btn-outline-social">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                            Continuar con Google
                        </button>
                        <button type="button" class="btn-outline-social">
                            <svg viewBox="0 0 24 24" fill="currentColor" style="width: 18px; margin-right: 10px;">
                                <path
                                    d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                            </svg>
                            GitHub
                        </button>
                    </div>
                </form>

                <div class="form-footer">
                    Don't have an account? <a routerLink="/register">Sign up</a>
                </div>
            </div>
        </div>
    </div>
</div>
