<div class="app-shell">
    <!-- Dynamic Background Blobs -->
    <div class="glowing-blob blob-1"></div>
    <div class="glowing-blob blob-2"></div>
    <div class="glowing-blob blob-3"></div>

    <!-- Global Header integrated from the design you like -->
    <header class="navbar glass-panel">
        <div class="logo" routerLink="/">
            <h1 class="logo-text">WEBROCKET<span>.</span></h1>
        </div>
        <nav class="nav-links">
            <a [routerLink]="['/']" fragment="services">Servicios</a>
            <a [routerLink]="['/']" fragment="about">Nosotros</a>
            <a [routerLink]="['/']" fragment="pricing">Precios</a>
        </nav>
        <div class="nav-actions">
            <button class="btn-theme" (click)="themeService.toggleTheme()"
                [title]="themeService.darkMode() ? 'Modo Claro' : 'Modo Oscuro'">
                <svg *ngIf="themeService.darkMode()" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" style="width: 20px;">
                    <path
                        d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                </svg>
                <svg *ngIf="!themeService.darkMode()" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" style="width: 20px;">
                    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                </svg>
            </button>
            <button routerLink="/login" class="btn-ghost">Ingresar</button>
            <button routerLink="/register" class="btn-premium">Empezar Gratis</button>
        </div>
    </header>

    <main class="main-content">
        <router-outlet></router-outlet>
    </main>
</div>
