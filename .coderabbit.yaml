# CodeRabbit Free Version Configuration
reviews:
  enabled: true
  changed_files_only: true
  path_filters:
    include:
      - "src/**/*.ts"
      - "src/**/*.html"
      - "src/**/*.css"
    exclude:
      - "node_modules/**"
      - "dist/**"
      - ".git/**"
  path_instructions: |
    Review Angular code for:
    - TypeScript best practices
    - Angular conventions
    - Basic security checks
    - Code quality issues
