# CodeRabbit Configuration for Angular Frontend
reviews:
  enabled: true
  changed_files_only: true
  auto_review:
    enabled: true
    drafts: false
    
  path_filters:
    include:
      - "src/**/*.ts"
      - "src/**/*.html"
      - "src/**/*.css"
      - "src/**/*.scss"
      - "angular.json"
      - "package.json"
      - "tsconfig.json"
    exclude:
      - "node_modules/**"
      - "dist/**"
      - ".git/**"
      - "**/*.spec.ts"
      - "coverage/**"

  path_instructions: |
    Review Angular code for:
    - TypeScript best practices and type safety
    - Angular conventions (components, services, modules)
    - Reactive forms and RxJS patterns
    - Performance optimization
    - Security best practices (XSS prevention, sanitization)
    - Accessibility (ARIA labels, semantic HTML)
    - Code organization and maintainability
    - Error handling and logging
    - Testing coverage and quality

# Chat instructions
chat:
  auto_reply: true
  context_prompt: |
    You are reviewing an Angular frontend application. 
    Focus on Angular best practices, TypeScript type safety, 
    component architecture, and user experience.
